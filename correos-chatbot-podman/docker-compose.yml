version: '3.8'

services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - correos-net
    restart: unless-stopped

  chatbot:
    build: .
    container_name: correos-chatbot
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    environment:
      - OLLAMA_URL=http://ollama:11434/api/chat
    networks:
      - correos-net
    depends_on:
      - ollama
    restart: unless-stopped

networks:
  correos-net:
    driver: bridge

volumes:
  ollama_data:
